name: Deploy HunarHub Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Set these in GitHub repository Variables for production builds.
      # Example:
      # VITE_API_BASE_URL = https://art-connect-c0ak.onrender.com/api/v1
      # VITE_BASE_PATH = /hunarhub/
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://art-connect-c0ak.onrender.com/api/v1' }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/hunarhub/' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist

