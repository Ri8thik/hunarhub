name: Deploy HunarHub Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "hunarhub/**"
      - ".github/workflows/deploy-hunarhub-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hunarhub
    env:
      # Set these in GitHub repository Variables for production builds.
      # Example:
      # VITE_API_BASE_URL = https://art-connect-c0ak.onrender.com/api/v1
      # VITE_BASE_PATH = /hunarhub/
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: hunarhub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: hunarhub/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

