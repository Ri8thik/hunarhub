image: node:20

stages:
  - deploy

pages:
  stage: deploy
  script:
    - npm ci
    - if [ -z "$VITE_API_BASE_URL" ]; then echo "VITE_API_BASE_URL is required in CI/CD variables" && exit 1; fi
    - VITE_BASE_PATH="/${CI_PROJECT_NAME}/" VITE_API_BASE_URL="$VITE_API_BASE_URL" npm run build
    - mkdir -p public
    - cp -r dist/* public/
    # SPA fallback for BrowserRouter deep links on GitLab Pages
    - cp public/index.html public/404.html
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


